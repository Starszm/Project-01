<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Video</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; 
            align-items: center;     
            background-color: #111;
        }

        video {
            max-width: 80%;
            height: auto;
            border: 3px solid white;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <video 
        src="video.mp4" 
        loop 
        autoplay 
        muted 
        controls 
        poster="poster.jpg">
        Your browser does not support the video tag.
    </video>

</body>
</html>
