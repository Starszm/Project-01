<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Landscapes Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Nature Landscapes Gallery</h1>

    <div class="gallery">

        <div class="image-card">
            <img src="images/image1.jpg" 
                 alt="Mountain landscape with snow-covered peaks"
                 width="400" height="400"
                 title="Snowy Mountain">
            
        </div>

        <div class="image-card">
            <img src="images/image2.jpg" 
                 alt="Sunset over a calm beach with orange sky"
                 width="400" height="400"
                 title="Beach Sunset">
            
        </div>

        <div class="image-card">
            <img src="images/image3.jpg" 
                 alt="Green forest with sunlight passing through trees"
                 width="400" height="400"
                 title="Forest Light">
            
        </div>
    </div>

</body>
</html>
